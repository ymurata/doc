# ============================================================
# LSP 基盤・補完・フォーマット・treesitter は dein.toml で管理
# ============================================================

# ============================================================
# Python LSP (pyright)
# ============================================================
[[plugins]]
repo = 'davidhalter/jedi-vim'
on_ft = 'python'
hook_add = '''
  let g:jedi#force_py_version = 'auto'
  let g:jedi#completions_enabled = 0
'''

# ============================================================
# Python フォーマット
# ============================================================
[[plugins]]
repo = 'tell-k/vim-autopep8'
on_ft = 'python'
hook_add = '''
  let g:syntastic_python_flake8_args = "--ignore=E501 --max-complexity 10"

  function! Autopep8()
    let l:search = @/
    let l:cursor = getpos('.')
    normal! H
    let l:window = getpos('.')
    call setpos('.', l:cursor)
    silent %!autopep8 --ignore=E501 -
    let @/ = l:search
    call setpos('.', l:window)
    normal! zt
    call setpos('.', l:cursor)
  endfunction

  autocmd FileType python nnoremap <S-f> :call Autopep8()<CR>
'''
